{{ define "main" }}
  <article
    class="o-single"
    data-pagefind-body
    {{- if .Params.pagefind_ignore -}}
      data-pagefind-ignore="all"
    {{- end -}}
  >
    <div class="o-single__header">
      <h1 data-pagefind-meta="title" data-pagefind-weight="10">{{ .Title }}</h1>
    </div>

    <div class="o-single__content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
