{{ define "main" }}
  <article class="o-list o-list--news">
    <div>
      <h1>{{ .Title }}</h1>
      {{ .Content }}
      <div>
        {{ range partial "helper/sortedNews" . }}
          {{ partial "teaser" (dict "listview" "true" "page" .) }}
        {{ end }}
      </div>
    </div>
  </article>
{{ end }}
