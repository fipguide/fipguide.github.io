<div class="o-dropdown o-fip-validity__dropdown">
  <button
    id="{{ .id }}-button"
    class="o-dropdown__button o-fip-validity__dropdown-button"
    aria-expanded="false"
    aria-haspopup="listbox"
    aria-controls="{{ .id }}-dropdown"
    data-fip-validity-button
    title="{{ T "fipValidity.selectIssuer" }}"
    style="anchor-name: --{{ .id }}-dropdown"
  >
    <span data-fip-validity-logo></span>
    <span
      data-fip-validity-label
      data-fip-validity-placeholder="{{ T "fipValidity.selectIssuerPlaceholder" }}"
    >
      {{ T "fipValidity.selectIssuerPlaceholder" }}
    </span>
    <div class="o-dropdown__icon">
      {{ partial "icon" "keyboard_arrow_down" }}
    </div>
  </button>
  <menu
    id="{{ .id }}-dropdown"
    class="o-dropdown__menu o-dropdown__menu--below o-dropdown__menu--left"
    role="listbox"
    aria-hidden="true"
    style="position-anchor: --{{ .id }}-dropdown"
  >
    {{- range .issuers -}}
      {{- $slug := .File.ContentBaseName -}}
      <li class="o-dropdown__item" aria-selected="false">
        <button
          class="a-button a-button__internal"
          role="option"
          data-fip-option="{{ $slug }}"
        >
          {{ partial "operator-logo" (dict "operator" $slug) }}
          {{ .Title }}
        </button>
      </li>
    {{- end -}}
    {{- if not .issuers -}}
      <li class="o-dropdown__item o-dropdown__item--empty">
        {{ T "fipValidity.noIssuers" }}
      </li>
    {{- end -}}
  </menu>
</div>
