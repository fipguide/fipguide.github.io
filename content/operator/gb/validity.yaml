# This file shows the rules for FIP cards issued by GB (National Rail).
_anchors:
  coupon-not-available: &coupon-not-available
    status: invalid
    text:
      de: "Nicht verfügbar"
      en: "Not available"
      fr: "Non disponible"
  reduced-50: &reduced-50
    status: valid
    text:
      de: "50 % Rabatt"
      en: "50 % discount"
      fr: "50 % de réduction"
  reduced-50-group: &reduced-50-group
    active: *reduced-50
    active-relatives: *reduced-50
    retired: *reduced-50
    retired-relatives: *reduced-50
  reduced-75: &reduced-75
    status: valid
    text:
      de: "75 % Rabatt"
      en: "75 % discount"
      fr: "75 % de réduction"
  reduced-75-group: &reduced-75-group
    active: *reduced-75
    active-relatives: *reduced-75
    retired: *reduced-75
    retired-relatives: *reduced-75
  reduced-active-75-retired-50-group: &reduced-active-75-retired-50-group
    active: *reduced-75
    active-relatives: *reduced-75
    retired: *reduced-50
    retired-relatives: *reduced-50
  coupon-active-1: &coupon-active-1
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Pro Jahr.</small>
      en: |
        **1 coupon**
        <small>Per year.</small>
      fr: |
        **1 coupon**
        <small>Par an.</small>
  coupon-active-2: &coupon-active-2
    status: valid
    text:
      de: |
        **2 Freifahrtscheine**
        <small>Pro Jahr.</small>
      en: |
        **2 coupons**
        <small>Per year.</small>
      fr: |
        **2 coupons**
        <small>Par an.</small>
  coupon-retired-1-safeguarded: &coupon-retired-1-safeguarded
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Pro Jahr (nur safeguarded).</small>
      en: |
        **1 coupon**
        <small>Per year (safeguarded only).</small>
      fr: |
        **1 coupon**
        <small>Par an (sécurisés uniquement).</small>
  coupon-retired-2-safeguarded: &coupon-retired-2-safeguarded
    status: valid
    text:
      de: |
        **2 Freifahrtscheine**
        <small>Pro Jahr (nur safeguarded).</small>
      en: |
        **2 coupons**
        <small>Per year (safeguarded only).</small>
      fr: |
        **2 coupons**
        <small>Par an (sécurisés uniquement).</small>
