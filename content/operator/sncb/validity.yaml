# This file shows the rules for FIP cards issued by SNCB.
_anchors:
  coupon-not-available: &coupon-not-available
    status: invalid
    text:
      de: "Nicht verfügbar"
      en: "Not available"
      fr: "Non disponible"
  reduced-50: &reduced-50
    status: valid
    text:
      de: "50 % FIP-Ermäßigung"
      en: "50 % FIP discount"
      fr: "50 % de réduction FIP"
  reduced-75: &reduced-75
    status: valid
    text:
      de: "75 % FIP-Ermäßigung"
      en: "75 % FIP discount"
      fr: "75 % de réduction FIP"
  coupon-active1: &coupon-active1
    status: valid
    text:
      de: "Aktive Mitarbeitende: 1 FIP Freifahrtschein pro Jahr."
      en: "Active employees: 1 FIP Coupon per year."
      fr: "Agents actifs : 1 Coupon FIP par an."
  coupon-active1-retired1: &coupon-active1-retired1
    status: valid
    text:
      de: |
        Aktive Mitarbeitende: 1 FIP Freifahrtschein pro Jahr. \
        Rentner: 1 FIP Freifahrtschein pro Jahr.
      en: |
        Active employees: 1 FIP Coupon per year. \
        Retirees: 1 FIP Coupon per year.
      fr: |
        Agents actifs : 1 Coupon FIP par an. \
        Retraités : 1 Coupon FIP par an.
  coupon-active2-retired1: &coupon-active2-retired1
    status: valid
    text:
      de: |
        Aktive Mitarbeitende: 2 FIP Freifahrtscheine pro Jahr. \
        Rentner: 1 FIP Freifahrtschein pro Jahr.
      en: |
        Active employees: 2 FIP Coupons per year. \
        Retirees: 1 FIP Coupon per year.
      fr: |
        Agents actifs : 2 Coupons FIP par an. \
        Retraités : 1 Coupon FIP par an.
  coupon-sncf: &coupon-sncf
    status: valid
    text:
      de: |
        Aktive Mitarbeitende (Réseau Nord): 8 FIP Freifahrtscheine pro Jahr. \
        Aktive Mitarbeitende (Réseau entier): 4 FIP Freifahrtscheine pro Jahr.
      en: |
        Active employees (Réseau Nord): 8 FIP Coupons per year. \
        Active employees (Réseau entier): 4 FIP Coupons per year.
      fr: |
        Agents actifs (Réseau Nord) : 8 Coupons FIP par an. \
        Agents actifs (Réseau entier) : 4 Coupons FIP par an.
  relatives-active1: &relatives-active1
    status: valid
    text:
      de: "Angehörige aktiver Mitarbeitender: 1 FIP Freifahrtschein pro Jahr."
      en: "Family of active employees: 1 FIP Coupon per year."
      fr: "Ayants droit des agents actifs : 1 Coupon FIP par an."
  relatives-active1-retired1: &relatives-active1-retired1
    status: valid
    text:
      de: |
        Angehörige aktiver Mitarbeitender: 1 FIP Freifahrtschein pro Jahr. \
        Angehörige von Rentnern: 1 FIP Freifahrtschein pro Jahr.
      en: |
        Family of active employees: 1 FIP Coupon per year. \
        Family of retirees: 1 FIP Coupon per year.
      fr: |
        Ayants droit des agents actifs : 1 Coupon FIP par an. \
        Ayants droit des retraités : 1 Coupon FIP par an.
  relatives-active2-retired1: &relatives-active2-retired1
    status: valid
    text:
      de: |
        Angehörige aktiver Mitarbeitender: 2 FIP Freifahrtscheine pro Jahr. \
        Angehörige von Rentnern: 1 FIP Freifahrtschein pro Jahr.
      en: |
        Family of active employees: 2 FIP Coupons per year. \
        Family of retirees: 1 FIP Coupon per year.
      fr: |
        Ayants droit des agents actifs : 2 Coupons FIP par an. \
        Ayants droit des retraités : 1 Coupon FIP par an.
  relatives-sncf: &relatives-sncf
    status: valid
    text:
      de: |
        Angehörige aktiver Mitarbeitender (Réseau Nord): 4 FIP Freifahrtscheine pro Jahr. \
        Angehörige aktiver Mitarbeitender (Réseau entier): 2 FIP Freifahrtscheine pro Jahr. \
        Angehörige von Rentnern (Kind): 1 FIP Freifahrtschein pro Jahr.
      en: |
        Family of active employees (Réseau Nord): 4 FIP Coupons per year. \
        Family of active employees (Réseau entier): 2 FIP Coupons per year. \
        Family of retirees (child): 1 FIP Coupon per year.
      fr: |
        Ayants droit des agents actifs (Réseau Nord) : 4 Coupons FIP par an. \
        Ayants droit des agents actifs (Réseau entier) : 2 Coupons FIP par an. \
        Ayants droit des retraités (enfant) : 1 Coupon FIP par an.
