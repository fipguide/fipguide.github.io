# This file shows the rules for FIP cards issued by SNCB.
_anchors:
  coupon-not-available: &coupon-not-available
    status: invalid
    text:
      de: "Nicht verfügbar"
      en: "Not available"
      fr: "Non disponible"
  reduced-50: &reduced-50
    status: valid
    text:
      de: "50 % Rabatt"
      en: "50 % discount"
      fr: "50 % de réduction"
  reduced-50-group: &reduced-50-group
    active: *reduced-50
    active-relatives: *reduced-50
    retired: *reduced-50
    retired-relatives: *reduced-50
  reduced-75: &reduced-75
    status: valid
    text:
      de: "75 % Rabatt"
      en: "75 % discount"
      fr: "75 % de réduction"
  reduced-75-group: &reduced-75-group
    active: *reduced-75
    active-relatives: *reduced-75
    retired: *reduced-75
    retired-relatives: *reduced-75
  coupon-1: &coupon-1
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Pro Jahr.</small>
      en: |
        **1 coupon**
        <small>Per year.</small>
      fr: |
        **1 coupon**
        <small>Par an.</small>
  coupon-2: &coupon-2
    status: valid
    text:
      de: |
        **2 Freifahrtscheine**
        <small>Pro Jahr.</small>
      en: |
        **2 coupons**
        <small>Per year.</small>
      fr: |
        **2 coupons**
        <small>Par an.</small>
  coupon-sncf-nord: &coupon-sncf-nord
    status: valid
    text:
      de: |
        **4 / 8 Freifahrtscheine**
        <small>Gesamtes Netz: 4 Freifahrtscheine pro Jahr. Région Nord: 8 Freifahrtscheine pro Jahr.</small>
      en: |
        **4 / 8 coupons**
        <small>Whole network: 4 coupons per year. Région Nord: 8 coupons per year.</small>
      fr: |
        **4 / 8 coupons**
        <small>Réseau entier : 4 coupons par an. Région Nord : 8 coupons par an.</small>
  relatives-sncf-nord: &relatives-sncf-nord
    status: valid
    text:
      de: |
        **2 / 4 Freifahrtscheine**
        <small>Gesamtes Netz: 2 Freifahrtscheine pro Jahr. Région Nord: 4 Freifahrtscheine pro Jahr.</small>
      en: |
        **2 / 4 coupons**
        <small>Whole network: 2 coupons per year. Région Nord: 4 coupons per year.</small>
      fr: |
        **2 / 4 coupons**
        <small>Réseau entier : 2 coupons par an. Région Nord : 4 coupons par an.</small>
  relatives-sncf-retired: &relatives-sncf-retired
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Pro Jahr (nur Kind).</small>
      en: |
        **1 coupon**
        <small>Per year (child only).</small>
      fr: |
        **1 coupon**
        <small>Par an (enfant uniquement).</small>
