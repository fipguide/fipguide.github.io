# This file shows the rules for FIP cards issued by DB.
_anchors:
  coupon-4fields: &coupon-4fields
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Mit jeweils 4 Feldern pro Jahr. Jedes Feld ist zwei Tage gültig.</small>
      en: |
        **1 coupon**
        <small>With 4 fields each per year. Each field is valid for two days.</small>
      fr: |
        **1 coupon**
        <small>Avec 4 champs chacun par an. Chaque champ est valable deux jours.</small>
  coupon-not-available: &coupon-not-available
    status: invalid
    text:
      de: "Nicht verfügbar"
      en: "Not available"
      fr: "Non disponible"
  reduced-50: &reduced-50
    status: valid
    text:
      de: "50 % Rabatt"
      en: "50 % discount"
      fr: "50 % de réduction"
  reduced-50-group: &reduced-50-group
    active: *reduced-50
    active-relatives: *reduced-50
    retired: *reduced-50
    retired-relatives: *reduced-50
  coupon-crossing: &coupon-crossing
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Mit jeweils 2 Feldern pro Jahr. Jedes Feld ist für eine Überfahrt gültig.</small>
      en: |
        **1 coupon**
        <small>With 2 fields each per year. Each field is valid for one crossing.</small>
      fr: |
        **1 coupon**
        <small>Avec 2 champs chacun par an. Chaque champ est valable pour une traversée.</small>
  coupon-former-1-onetime: &coupon-former-1-onetime
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Einmalig, innerhalb von 45 Monaten nach Austritt.</small>
      en: |
        **1 coupon**
        <small>One-time, within 45 months after leaving.</small>
      fr: |
        **1 coupon**
        <small>Unique, dans les 45 mois suivant le départ.</small>
card-validity:
  de: |
    Der FIP Ausweis ist für eine feste Periode von drei Jahren gültig. Die aktuelle Periode ist 2025-2026-2027.
  en: |
    The FIP Card is valid for a fixed period of three years. The current period is 2025-2026-2027.
  fr: |
    La Carte FIP est valable pour une période fixe de trois ans. La période actuelle est 2025-2026-2027.

national-discounts:
  de: |
    Bei Fahrten ins Ausland, können Mitarbeitende der Deutschen Bahn für die Fahrt bis zum Grenztarifpunkt nationale Vergünstigungen nutzen. Dafür kann ein Tagesticket M Fern oder eine NetzCard genutzt werden. Diese gelten im gesamten Netz und somit bis zum Grenztarifpunkt zu den Nachbarländern.

    Teilweise sind andere Tickets, die auf dem gesamten Abschnitt gelten, günstigere Alternativen zu FIP. Dazu gehören (Super) Sparpreise Europa DB-PEP (Nur in Verbindung mit einem Reisenden mit FIP, siehe Nutzungsbestimmungen) oder auch normale (Super) Sparpreise. Weitere Informationen dazu sind im DB Reisemarkt und DB Personalportal zu finden.
  en: |
    When traveling abroad, DB employees can use national discounts for travel up to the border tariff point. For this, a Tagesticket M Fern or a NetzCard can be used. These are valid on the entire network and thus up to the border tariff point to neighboring countries.

    In some cases, other tickets valid for the entire segment offer cheaper alternatives to FIP. These include (Super) Sparpreise Europa DB-PEP (only in combination with a traveler with FIP, see terms of use) or regular (Super) Sparpreise (savings fares). More information can be found in the DB Reisemarkt and DB employee portal.
  fr: |
    Lors de déplacements à l’étranger, les employés de la Deutsche Bahn peuvent bénéficier de réductions nationales pour le trajet jusqu’au point de tarif frontalier. Pour cela, un Tagesticket M Fern ou une NetzCard peut être utilisé. Ceux-ci sont valables sur l’ensemble du réseau et donc jusqu’au point de tarif frontalier vers les pays voisins.

    Dans certains cas, d’autres billets valables pour le segment entier offrent des alternatives moins chères au FIP. Ceux-ci comprennent (Super) Sparpreise Europa DB-PEP (uniquement en combinaison avec un voyageur avec FIP, voir conditions d’utilisation) ou les (Super) Sparpreise réguliers (tarifs de réduction). Plus d’informations peuvent être trouvées sur le DB Reisemarkt et le portail des employés DB.
general:
  fip-coupon:
    de: |
      Die Beantragung von FIP Freifahrtscheinen für DB Mitarbeitende muss mind. vier Wochen vor Gültigkeitsbeginn über das DB Personalportal beantragt werden.

      Freifahrtscheine können mit 1 bis 4 Feldern beantragt werden. Wenn bereits ein Freifahrtschein mit weniger als vier Feldern im gleichen Jahr bentragt wurde, verfallen die weiteren Felder und können nicht erneut beantragt werden. Jedes Feld wird individuell versteuert. Mehr Informationen dazu unter [Versteuerung](/taxation).
    en: |
      FIP Coupon requests for DB employees must be submitted via the DB employee portal at least four weeks before the start of validity.

      Coupons can be requested with 1 to 4 fields. If a coupon with fewer than four fields has already been requested in the same year, the remaining fields expire and cannot be requested again. Each field is taxed individually. More information is available under [Taxation](/taxation).
    fr: |
      Les demandes de Coupons FIP pour les employés DB doivent être soumises via le portail des employés DB au moins quatre semaines avant le début de validité.

      Les Coupons peuvent être demandés avec 1 à 4 champs. Si un coupon avec moins de quatre champs a déjà été demandé la même année, les champs restants expirent et ne peuvent pas être redemandés. Chaque champ est imposé individuellement. Plus d’informations sous [Imposition](/taxation).
