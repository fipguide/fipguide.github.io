# This file shows the rules for FIP cards issued by NS.
_anchors:
  coupon-not-available: &coupon-not-available
    status: invalid
    text:
      de: "Nicht verfügbar"
      en: "Not available"
      fr: "Non disponible"
  free-travel: &free-travel
    status: valid
    text:
      de: "Unbegrenzte Anzahl an Ländercoupons möglich (jeweils ein Coupon pro Anfrage)."
      en: "Unlimited country coupons can be requested (one coupon per request)."
      fr: "Un nombre illimité de coupons pays peut être demandé (un coupon par demande)."
  coupon-active-1: &coupon-active-1
    status: valid
    text:
      de: "1 Freifahrtschein pro Jahr."
      en: "1 coupon per year."
      fr: "1 coupon par an."
  coupon-active-2: &coupon-active-2
    status: valid
    text:
      de: "2 Freifahrtscheine pro Jahr."
      en: "2 coupons per year."
      fr: "2 coupons par an."
  coupon-active-4: &coupon-active-4
    status: valid
    text:
      de: "4 Freifahrtscheine pro Jahr."
      en: "4 coupons per year."
      fr: "4 coupons par an."
  coupon-former-1: &coupon-former-1
    status: valid
    text:
      de: "1 Freifahrtschein pro Jahr."
      en: "1 coupon per year."
      fr: "1 coupon par an."
  coupon-former-2: &coupon-former-2
    status: valid
    text:
      de: "2 Freifahrtscheine pro Jahr."
      en: "2 coupons per year."
      fr: "2 coupons par an."
  coupon-former-1-onetime: &coupon-former-1-onetime
    status: valid
    text:
      de: "1 Freifahrtschein (einmalig, innerhalb von 45 Monaten nach Austritt)."
      en: "1 coupon (one-time, within 45 months after leaving)."
      fr: "1 coupon (unique, dans les 45 mois suivant le départ)."
  relatives-active-1: &relatives-active-1
    status: valid
    text:
      de: "1 Freifahrtschein pro Jahr."
      en: "1 coupon per year."
      fr: "1 coupon par an."
  relatives-active-2: &relatives-active-2
    status: valid
    text:
      de: "2 Freifahrtscheine pro Jahr."
      en: "2 coupons per year."
      fr: "2 coupons par an."
  relatives-active-4: &relatives-active-4
    status: valid
    text:
      de: "4 Freifahrtscheine pro Jahr."
      en: "4 coupons per year."
      fr: "4 coupons par an."
  relatives-former-1: &relatives-former-1
    status: valid
    text:
      de: "1 Freifahrtschein pro Jahr."
      en: "1 coupon per year."
      fr: "1 coupon par an."
  relatives-former-2: &relatives-former-2
    status: valid
    text:
      de: "2 Freifahrtscheine pro Jahr."
      en: "2 coupons per year."
      fr: "2 coupons par an."
  relatives-former-1-onetime: &relatives-former-1-onetime
    status: valid
    text:
      de: "1 Freifahrtschein (einmalig, innerhalb von 45 Monaten nach Austritt)."
      en: "1 coupon (one-time, within 45 months after leaving)."
      fr: "1 coupon (unique, dans les 45 mois suivant le départ)."
  relatives-sncf-active: &relatives-sncf-active
    status: valid
    text:
      de: |
        Gesamtes Netz: 1 Freifahrtschein pro Jahr. \
        Région Nord: 3 Freifahrtscheine pro Jahr.
      en: |
        Whole network: 1 coupon per year. \
        Région Nord: 3 coupons per year.
      fr: |
        Réseau entier : 1 coupon par an. \
        Région Nord : 3 coupons par an.
