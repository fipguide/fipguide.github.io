# This file shows the rules for FIP cards issued by NS.
_anchors:
  coupon-not-available: &coupon-not-available
    status: invalid
    text:
      de: "Nicht verfügbar"
      en: "Not available"
      fr: "Non disponible"
  free-travel: &free-travel
    status: valid
    text:
      de: |
        **Unbegrenzt**
        <small>Unbegrenzte Anzahl an Ländercoupons möglich (jeweils ein Coupon pro Anfrage).</small>
      en: |
        **Unlimited**
        <small>Unlimited country coupons can be requested (one coupon per request).</small>
      fr: |
        **Illimité**
        <small>Un nombre illimité de coupons pays peut être demandé (un coupon par demande).</small>
  coupon-1: &coupon-1
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Pro Jahr.</small>
      en: |
        **1 coupon**
        <small>Per year.</small>
      fr: |
        **1 coupon**
        <small>Par an.</small>
  coupon-2: &coupon-2
    status: valid
    text:
      de: |
        **2 Freifahrtscheine**
        <small>Pro Jahr.</small>
      en: |
        **2 coupons**
        <small>Per year.</small>
      fr: |
        **2 coupons**
        <small>Par an.</small>
  coupon-4: &coupon-4
    status: valid
    text:
      de: |
        **4 Freifahrtscheine**
        <small>Pro Jahr.</small>
      en: |
        **4 coupons**
        <small>Per year.</small>
      fr: |
        **4 coupons**
        <small>Par an.</small>
  coupon-1-onetime: &coupon-1-onetime
    status: valid
    text:
      de: |
        **1 Freifahrtschein**
        <small>Einmalig, innerhalb von 45 Monaten nach Austritt.</small>
      en: |
        **1 coupon**
        <small>One-time, within 45 months after leaving.</small>
      fr: |
        **1 coupon**
        <small>Unique, dans les 45 mois suivant le départ.</small>
  relatives-sncf-active: &relatives-sncf-active
    status: valid
    text:
      de: |
        **1 / 3 Freifahrtscheine**
        <small>Gesamtes Netz: 1 Freifahrtschein pro Jahr. Région Nord: 3 Freifahrtscheine pro Jahr.</small>
      en: |
        **1 / 3 coupons**
        <small>Whole network: 1 coupon per year. Région Nord: 3 coupons per year.</small>
      fr: |
        **1 / 3 coupons**
        <small>Réseau entier : 1 coupon par an. Région Nord : 3 coupons par an.</small>
