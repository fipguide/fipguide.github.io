# This file shows the rules for FIP cards issued by NS.
_anchors:
  coupon-not-available: &coupon-not-available
    status: invalid
    text:
      de: "Nicht verfügbar"
      en: "Not available"
      fr: "Non disponible"
  free-travel: &free-travel
    status: valid
    text:
      de: "Unbegrenzte Anzahl an Ländercoupons möglich (jeweils ein Coupon pro Anfrage)."
      en: "Unlimited country coupons can be requested (one coupon per request)."
      fr: "Un nombre illimité de coupons pays peut être demandé (un coupon par demande)."
  coupon-active-1: &coupon-active-1
    status: valid
    text:
      de: "1 Freifahrtschein pro Jahr (mind. 50 % Arbeitszeit)."
      en: "1 coupon per year (min. 50 % employment)."
      fr: "1 coupon par an (min. 50 % d'emploi)."
  coupon-active-2: &coupon-active-2
    status: valid
    text:
      de: "2 Freifahrtscheine pro Jahr (mind. 50 % Arbeitszeit)."
      en: "2 coupons per year (min. 50 % employment)."
      fr: "2 coupons par an (min. 50 % d'emploi)."
  coupon-active-4: &coupon-active-4
    status: valid
    text:
      de: "4 Freifahrtscheine pro Jahr (mind. 50 % Arbeitszeit)."
      en: "4 coupons per year (min. 50 % employment)."
      fr: "4 coupons par an (min. 50 % d'emploi)."
  coupon-former-1: &coupon-former-1
    status: valid
    text:
      de: "1 Freifahrtschein pro Jahr (mind. 11 Jahre Dienstzeit)."
      en: "1 coupon per year (min. 11 years of service)."
      fr: "1 coupon par an (min. 11 ans de service)."
  coupon-former-2: &coupon-former-2
    status: valid
    text:
      de: "2 Freifahrtscheine pro Jahr (mind. 11 Jahre Dienstzeit)."
      en: "2 coupons per year (min. 11 years of service)."
      fr: "2 coupons par an (min. 11 ans de service)."
  coupon-former-1-onetime: &coupon-former-1-onetime
    status: valid
    text:
      de: "1 Freifahrtschein (einmalig, innerhalb von 45 Monaten nach Austritt, mind. 11 Jahre Dienstzeit)."
      en: "1 coupon (one-time, within 45 months after leaving, min. 11 years of service)."
      fr: "1 coupon (unique, dans les 45 mois suivant le départ, min. 11 ans de service)."
  relatives-active-1: &relatives-active-1
    status: valid
    text:
      de: "1 Freifahrtschein pro Jahr (Partner/Kind aktiver Mitarbeitender, mind. 50 % Arbeitszeit)."
      en: "1 coupon per year (partner/child of active employees, min. 50 % employment)."
      fr: "1 coupon par an (partenaire/enfant d'employés actifs, min. 50 % d'emploi)."
  relatives-active-2: &relatives-active-2
    status: valid
    text:
      de: "2 Freifahrtscheine pro Jahr (Partner/Kind aktiver Mitarbeitender, mind. 50 % Arbeitszeit)."
      en: "2 coupons per year (partner/child of active employees, min. 50 % employment)."
      fr: "2 coupons par an (partenaire/enfant d'employés actifs, min. 50 % d'emploi)."
  relatives-active-4: &relatives-active-4
    status: valid
    text:
      de: "4 Freifahrtscheine pro Jahr (Partner/Kind aktiver Mitarbeitender, mind. 50 % Arbeitszeit)."
      en: "4 coupons per year (partner/child of active employees, min. 50 % employment)."
      fr: "4 coupons par an (partenaire/enfant d'employés actifs, min. 50 % d'emploi)."
  relatives-former-1: &relatives-former-1
    status: valid
    text:
      de: "1 Freifahrtschein pro Jahr (Partner ehemaliger Mitarbeitender, mind. 11 Jahre Dienstzeit)."
      en: "1 coupon per year (partner of former employees, min. 11 years of service)."
      fr: "1 coupon par an (partenaire d'anciens employés, min. 11 ans de service)."
  relatives-former-2: &relatives-former-2
    status: valid
    text:
      de: "2 Freifahrtscheine pro Jahr (Partner ehemaliger Mitarbeitender, mind. 11 Jahre Dienstzeit)."
      en: "2 coupons per year (partner of former employees, min. 11 years of service)."
      fr: "2 coupons par an (partenaire d'anciens employés, min. 11 ans de service)."
  relatives-former-1-onetime: &relatives-former-1-onetime
    status: valid
    text:
      de: "1 Freifahrtschein (einmalig, innerhalb von 45 Monaten nach Austritt, Partner ehemaliger Mitarbeitender, mind. 11 Jahre Dienstzeit)."
      en: "1 coupon (one-time, within 45 months after leaving, partner of former employees, min. 11 years of service)."
      fr: "1 coupon (unique, dans les 45 mois suivant le départ, partenaire d'anciens employés, min. 11 ans de service)."
  relatives-sncf-active: &relatives-sncf-active
    status: valid
    text:
      de: |
        SNCF: 1 Freifahrtschein pro Jahr (Partner/Kind aktiver Mitarbeitender, mind. 50 % Arbeitszeit). \
        Région Nord: 3 Freifahrtscheine pro Jahr (Partner/Kind aktiver Mitarbeitender, mind. 50 % Arbeitszeit).
      en: |
        SNCF: 1 coupon per year (partner/child of active employees, min. 50 % employment). \
        Région Nord: 3 coupons per year (partner/child of active employees, min. 50 % employment).
      fr: |
        SNCF: 1 coupon par an (partenaire/enfant d'employés actifs, min. 50 % d'emploi). \
        Région Nord: 3 coupons par an (partenaire/enfant d'employés actifs, min. 50 % d'emploi).
