backend:
  name: github
  repo: MoritzWeber0/fipguide.github.io
  branch: main
  auth_scope: repo
  open_authoring: true
  site_domain: fipguide-test.netlify.app
publish_mode: editorial_workflow
media_folder: static/img
public_folder: /img

i18n:
  structure: multiple_files
  locales: [en, de, fr]
  default_locale: en

collections:
  - name: "news"
    label: "News"
    folder: "content/news"
    path: "{{slug}}/index"
    publish: false
    create: true
    i18n: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - {
          label: "Publish Date",
          name: "date",
          widget: "datetime",
          i18n: duplicate,
        }
      - { label: "Author", name: "author", widget: "string", i18n: duplicate }
      - {
          label: "Description",
          name: "description",
          widget: "string",
          required: false,
          i18n: true,
        }
      - label: "Body"
        name: "body"
        widget: "markdown"
        i18n: true
        editor_components:
          [
            "image",
            "highlight",
            "expander",
            "button",
            "dialog",
            "float-image",
            "icon",
            "wip",
          ]

  - name: "country"
    label: "Countries"
    folder: "content/country"
    path: "{{slug}}/index"
    create: false
    publish: false
    delete: false
    i18n: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Country", name: "country", widget: "string", i18n: duplicate }
      - label: "Body"
        name: "body"
        widget: "markdown"
        i18n: true
        editor_components:
          [
            "image",
            "highlight",
            "expander",
            "button",
            "dialog",
            "float-image",
            "icon",
            "wip",
            "identify-operator",
          ]

  - name: "operator"
    label: "Operators"
    folder: "content/operator"
    path: "{{slug}}/index"
    publish: false
    i18n: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - {
          label: "Operator",
          name: "operator",
          widget: "string",
          i18n: duplicate,
        }
      - { label: "Countries", name: "country", widget: "list", i18n: true }
      - label: "Body"
        name: "body"
        widget: "markdown"
        i18n: true
        editor_components:
          [
            "image",
            "highlight",
            "expander",
            "fip-validity",
            "train-category",
            "booking",
            "button",
            "dialog",
            "float-image",
            "icon",
            "wip",
            "fip-validity-comparison",
          ]

  - name: "booking"
    label: "Booking Platforms"
    folder: "content/booking"
    path: "{{slug}}/index"
    publish: false
    create: true
    i18n: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - {
          label: "Description",
          name: "description",
          widget: "string",
          required: false,
          i18n: true,
        }
      - name: params
        label: "Parameters"
        widget: object
        i18n: true
        fields:
          - label: "Type"
            name: type
            widget: select
            options: [website, onsite, phone, email, socialmedia, machine]
            i18n: duplicate
          - {
              label: "FIP 50",
              name: fip_50,
              widget: boolean,
              default: false,
              i18n: duplicate,
            }
          - {
              label: "FIP Global Fare",
              name: fip_global_fare,
              widget: boolean,
              default: false,
              required: false,
              i18n: duplicate,
            }
          - {
              label: "Reservations",
              name: reservations,
              widget: boolean,
              default: false,
              i18n: duplicate,
            }
          - {
              label: "Booking Link",
              name: booking_link,
              widget: string,
              required: false,
              i18n: duplicate,
            }
          - {
              label: "Additional Info Link",
              name: additional_info_link,
              widget: string,
              required: false,
              i18n: duplicate,
            }
          - name: classes
            label: "Classes"
            widget: object
            required: false
            i18n: true
            fields:
              - {
                  label: "First Class",
                  name: first,
                  widget: string,
                  required: false,
                  i18n: duplicate,
                }
              - {
                  label: "Second Class",
                  name: second,
                  widget: string,
                  required: false,
                  i18n: duplicate,
                }
      - label: "Body"
        name: "body"
        widget: "markdown"
        i18n: true
        editor_components:
          [
            "image",
            "highlight",
            "expander",
            "booking-section",
            "button",
            "satellite",
            "dialog",
            "float-image",
            "icon",
            "wip",
          ]

  - name: "general"
    label: "General Pages"
    folder: "content/general"
    path: "{{slug}}/index"
    create: false
    publish: false
    delete: false
    i18n: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - {
          label: "Description",
          name: "description",
          widget: "string",
          required: false,
          i18n: true,
        }
      - label: "Body"
        name: "body"
        widget: "markdown"
        i18n: true
        editor_components:
          [
            "image",
            "highlight",
            "expander",
            "button",
            "dialog",
            "float-image",
            "icon",
            "wip",
          ]

  - name: "identify-operator"
    label: "Identify Operator"
    folder: "content/identify-operator"
    path: "{{slug}}/index"
    publish: false
    create: true
    i18n: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - name: params
        label: "Parameters"
        widget: object
        i18n: true
        fields:
          - {
              label: "URL",
              name: url,
              widget: string,
              required: false,
              i18n: duplicate,
            }
      - label: "Body"
        name: "body"
        widget: "markdown"
        i18n: true
        editor_components:
          [
            "image",
            "highlight",
            "expander",
            "button",
            "dialog",
            "float-image",
            "icon",
            "wip",
          ]

  - name: "faq"
    label: "FAQ"
    folder: "content/general/faq"
    path: "{{slug}}/_index"
    publish: false
    create: true
    i18n: true
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - {
          label: "Weight",
          name: "weight",
          widget: "number",
          required: false,
          i18n: duplicate,
        }
      - label: "Body"
        name: "body"
        widget: "markdown"
        i18n: true
        editor_components:
          [
            "image",
            "highlight",
            "expander",
            "button",
            "dialog",
            "float-image",
            "icon",
            "wip",
          ]
