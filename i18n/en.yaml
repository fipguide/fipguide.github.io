  fipcard:
    label: Application for FIP Card and FIP Coupon
    note: >-
      Unfortunately, we are unable to help in this case. We are an independent
      community project and therefore cannot influence the issuance of FIP Cards
      and FIP Coupons.

      Please contact your responsible HR department.
  formAriaLabel: Contact Form
  general:
    label: General question about using FIP
    note: >-
      We answer general questions on the [General
      Information](/generalinformation) page. Feel free to use the search for
      specific terms.

      Detailed information can be found on [country pages](/country) and
      [operator pages](/operator).


      Specific questions are answered by the community and the FIP Guide team on
      [Discord](https://discord.gg/5nWS9Eu9zz).
