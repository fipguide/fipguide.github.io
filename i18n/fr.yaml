  summary-all-assigned-ok: >-
    Tous les coupons sont répartis par mois et aucun mois ne dépasse {{
    .Threshold }} €.
  summary-all-assigned-over-month: >-
    Tous les coupons sont attribués, mais au moins un mois dépasse {{ .Threshold
    }} €. Dans ce cas, le montant mensuel entier est imposable, et pas seulement
    la part au-dessus du seuil.
  summary-over-limit-unassigned: >-
    Le total dépasse {{ .Threshold }} € et n’est pas encore entièrement réparti
    par mois. Dès que {{ .Threshold }} € sont dépassés, le montant mensuel
    entier est imposable, et pas seulement la part au-dessus du seuil.
  summary-under-limit: >-
    Le total est au maximum de {{ .Threshold }} €. Aucune imposition
    supplémentaire ne s’applique.
  threshold-above: >-
    Le total dépasse le seuil d’exonération de {{ .Threshold }} €. Le montant
    entier (pas seulement ce qui dépasse le seuil) est ajouté au revenu
    imposable.
  threshold-below: >-
    Le total est inférieur au seuil d’exonération de {{ .Threshold }} €. Aucune
    cotisation fiscale ou sociale supplémentaire ne s’applique.
  threshold-excess: 'Montant dépassant le seuil :'
