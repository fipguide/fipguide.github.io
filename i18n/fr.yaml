  fip-coupon-description: >-
    Sélectionnez d'abord l'émetteur de votre Carte FIP. Si vous êtes éligible,
    vous pouvez demander les Coupons FIP auprès de votre employeur. Veuillez
    noter que nous ne sommes pas en mesure d'aider à l'obtention des Coupons
